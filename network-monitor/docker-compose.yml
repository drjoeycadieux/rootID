version: "3.9"

services:
  network-monitor:
    build: .
    image: network-monitor:latest
    container_name: network-monitor
    ports:
      - "3000:3000"
    restart: unless-stopped
    # NET_RAW is required for ping inside the container
    cap_add:
      - NET_RAW
    environment:
      - PORT=3000
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
